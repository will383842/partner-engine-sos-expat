name: Deploy Partner Engine

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            cd /opt/partner-engine

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart ALL containers
            docker compose build --no-cache app queue scheduler
            docker compose up -d --force-recreate app queue scheduler nginx

            # Clear Laravel caches
            docker exec pe-app php artisan optimize:clear
            docker exec pe-app php artisan optimize

            # Run migrations if any
            docker exec pe-app php artisan migrate --force

            echo "Partner Engine deployed: $(date)"
