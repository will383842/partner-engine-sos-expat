# pe-nginx container config — serves Laravel via PHP-FPM (pe-app:9000)
#
# This runs INSIDE the pe-nginx Docker container and receives traffic from
# the HOST Nginx (which terminates SSL and forwards X-Forwarded-* headers).
#
# We accept any Host header (server_name _) because 4 different subdomains
# (partner-engine, admin, sos-call, + legacy life-expat) all route here.
# Laravel uses trustProxies + X-Forwarded-Host to render the correct host.

server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 50M;

    # Security headers (also set by host Nginx, but defense in depth)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml font/woff font/woff2;
    gzip_min_length 256;

    # Health check
    location /up {
        try_files $uri /index.php?$query_string;
    }

    # Favicon — return 204 if not on disk, avoids log spam from browsers.
    location = /favicon.ico {
        try_files $uri =204;
        log_not_found off;
        access_log off;
    }

    # Robots.txt — same treatment if missing.
    location = /robots.txt {
        try_files $uri =204;
        log_not_found off;
        access_log off;
    }

    # Livewire assets (served dynamically by Laravel, NOT on disk).
    # ^~ prefix has priority over regex below — must come first.
    location ^~ /livewire/ {
        try_files $uri /index.php?$query_string;
    }

    # Static assets — serve directly, with long cache.
    # Falls back to Laravel if file not on disk (Filament/Livewire serve some JS dynamically).
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri /index.php?$query_string;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Laravel default routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM — propagate X-Forwarded-* so Laravel sees HTTPS
    location ~ \.php$ {
        fastcgi_pass pe-app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # CRITICAL: propagate proxy headers so Laravel trustProxies works
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for if_not_empty;
        fastcgi_param HTTPS                  $https if_not_empty;

        # Force HTTPS param when X-Forwarded-Proto is https
        set $fcgi_https "";
        if ($http_x_forwarded_proto = "https") {
            set $fcgi_https "on";
        }
        fastcgi_param HTTPS $fcgi_https if_not_empty;

        fastcgi_read_timeout 120s;
        fastcgi_connect_timeout 10s;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
