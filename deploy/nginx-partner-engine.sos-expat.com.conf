# API Partner Engine — partner-engine.sos-expat.com
# Remplace progressivement partner-engine.life-expat.com (ancien domaine)

server {
    listen 80;
    listen [::]:80;
    server_name partner-engine.sos-expat.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name partner-engine.sos-expat.com;

    ssl_certificate     /etc/letsencrypt/live/partner-engine.sos-expat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/partner-engine.sos-expat.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/html/public;
    index index.php;
    client_max_body_size 15M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Health check
    location /up { try_files $uri /index.php?$query_string; }

    # API + webhooks
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass pe-app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
        # Larger body for Stripe webhook payloads
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    location ~ /\.(?!well-known) { deny all; }

    access_log /var/log/nginx/partner-engine.sos-expat.com.access.log;
    error_log  /var/log/nginx/partner-engine.sos-expat.com.error.log;
}
