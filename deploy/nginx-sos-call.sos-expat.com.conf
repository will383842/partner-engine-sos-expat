# Public SOS-Call subscriber landing — sos-call.sos-expat.com
# Blade page + /mon-acces dashboard (magic link auth)

server {
    listen 80;
    listen [::]:80;
    server_name sos-call.sos-expat.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sos-call.sos-expat.com;

    ssl_certificate     /etc/letsencrypt/live/sos-call.sos-expat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sos-call.sos-expat.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/html/public;
    index index.php;
    client_max_body_size 5M;

    # Strict security (public page, code-sensitive)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;

    # Only allow public Blade routes (no API, no admin)
    # Everything else returns 404 (handled by Laravel routing).

    # Root → /sos-call landing
    location = / {
        try_files $uri /index.php?$query_string;
    }

    # Allowed paths
    location ~ ^/(sos-call|mon-acces)(/|$) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Block anything else at the Nginx level
    location / {
        return 404;
    }

    location ~ \.php$ {
        fastcgi_pass pe-app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 30s;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    access_log /var/log/nginx/sos-call.sos-expat.com.access.log;
    error_log  /var/log/nginx/sos-call.sos-expat.com.error.log;
}
