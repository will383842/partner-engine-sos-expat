# Filament admin console — admin.sos-expat.com
# Installed via: sudo cp this file → /etc/nginx/sites-available/ → symlink to sites-enabled
# Requires: SSL cert from Let's Encrypt for admin.sos-expat.com

server {
    listen 80;
    listen [::]:80;
    server_name admin.sos-expat.com;

    # Let's Encrypt HTTP-01 challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.sos-expat.com;

    ssl_certificate     /etc/letsencrypt/live/admin.sos-expat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.sos-expat.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/html/public;
    index index.php;
    client_max_body_size 50M;  # Filament file uploads

    # Security headers (Filament admin = stricter)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss;
    gzip_min_length 256;

    # Auto-redirect root to /admin (the Filament panel)
    location = / {
        return 302 /admin;
    }

    # Filament + Livewire routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass pe-app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
        fastcgi_connect_timeout 10s;
    }

    # Static Filament assets (published via php artisan filament:install)
    location ~ ^/(css|js|vendor)/filament/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }

    access_log /var/log/nginx/admin.sos-expat.com.access.log;
    error_log  /var/log/nginx/admin.sos-expat.com.error.log;
}
