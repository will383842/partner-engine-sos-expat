# Filament admin console — admin.sos-expat.com
# Host Nginx → proxy_pass → pe-nginx container (127.0.0.1:8083)
#
# Important: the host Nginx is NOT inside the Docker network, so we cannot
# use Docker service names (pe-app, pe-nginx). We proxy to the exposed port
# of the pe-nginx container which then does fastcgi_pass to pe-app internally.

server {
    listen 80;
    listen [::]:80;
    server_name admin.sos-expat.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.sos-expat.com;

    ssl_certificate     /etc/letsencrypt/live/admin.sos-expat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.sos-expat.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Proxy to pe-nginx container (which fastcgi_passes to pe-app internally)
    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    access_log /var/log/nginx/admin.sos-expat.com.access.log;
    error_log  /var/log/nginx/admin.sos-expat.com.error.log;
}
